name: blackjack_trainer
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+14

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.2
  google_mobile_ads: ^5.0.0
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.0+11
  in_app_purchase_storekit: ^0.3.6+7
  google_fonts: ^6.2.1
  audioplayers: ^5.2.1
  url_launcher: ^6.3.0
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/cards/
    - assets/audio/
    - assets/icon/
    - assets/google_fonts/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/Logo_New - 1024.png"
  adaptive_icon_foreground: "assets/icon/Logo_New - 1024.png"
  adaptive_icon_background: "#0B1F2A"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B1F2A"
  image: assets/icon/Logo_New - 1024.png
  android_12:
    image: assets/icon/Logo_New - 1024.png
    color: "#0B1F2A"